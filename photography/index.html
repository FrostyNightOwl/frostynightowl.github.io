<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography — Night Owl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Source+Sans+3:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --bg-2: #0a0a0a;
  --bg-3: #141414;
  --white: #f5f0e8;
  --cream: #d8d0bc;
  --gold: #c9a84c;
  --gold-light: #e8cc80;
  --ink: #c4c1b8;
  --ink-dim: #888278;
  --ink-faint: #4a4540;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  position: relative;
  overscroll-behavior: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 50%, rgba(40, 30, 20, 0.25) 0%, transparent 70%),
    radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 95%);
  pointer-events: none;
  z-index: 1;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 2;
  opacity: 0.08;
  mix-blend-mode: overlay;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 1.5rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 50;
  background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.home-link {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  color: var(--white);
  text-decoration: none;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: color 0.4s;
  opacity: 0.85;
}
.home-link::before {
  content: '←';
  color: var(--gold);
  transition: transform 0.4s;
}
.home-link:hover { opacity: 1; color: var(--gold-light); }
.home-link:hover::before { transform: translateX(-4px); }

.section-mark {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.45em;
  color: var(--gold);
  text-transform: uppercase;
  opacity: 0.85;
}

/* STAGE */
.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  z-index: 3;
}

.carousel {
  position: absolute;
  inset: 0;
}

/* === CARDS === */
.photo-item {
  position: absolute;
  top: 50%;
  left: 50%;
  width: clamp(280px, 32vw, 480px);
  height: clamp(380px, 64vh, 640px);
  transform: translate(-50%, -50%);
  /* UPDATE: Removed 'filter' from transition and will-change */
  transition:
    transform 0.85s cubic-bezier(0.16, 1, 0.3, 1),
    opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  will-change: transform, opacity;
  opacity: 0;
}

.photo-frame {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
  overflow: hidden;
  border-radius: 20px;
  box-shadow:
    0 30px 60px -20px rgba(0,0,0,0.85),
    0 0 0 1px rgba(255,255,255,0.06);
  /* UPDATE: Added transition for the center glow */
  transition: box-shadow 0.85s cubic-bezier(0.16, 1, 0.3, 1);
}

.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 0.6s;
}
.photo-item img.loaded { opacity: 1; }

.photo-item.is-center .photo-frame {
  box-shadow:
    0 40px 80px -25px rgba(0,0,0,0.95),
    0 0 0 1px rgba(201, 168, 76, 0.25),
    0 0 100px -20px rgba(201, 168, 76, 0.25);
}

.photo-item.is-center { cursor: zoom-in; }

/* Card tag (top badge) */
.card-tag {
  position: absolute;
  top: 1.1rem;
  left: 1.1rem;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--white);
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 0.45rem 0.9rem;
  border: 1px solid rgba(201, 168, 76, 0.35);
  z-index: 3;
  font-weight: 500;
  border-radius: 4px;
}

/* Card caption overlay */
.card-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 4rem 1.5rem 1.6rem;
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.92) 100%);
  z-index: 3;
  pointer-events: none;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 1.8vw, 1.5rem);
  color: var(--white);
  font-style: italic;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 0.55rem;
  letter-spacing: -0.005em;
}

.card-meta {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-weight: 500;
}
.card-meta::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

/* Error state for missing images */
.photo-frame.error {
  background: repeating-linear-gradient(
    45deg,
    #1a0d0d,
    #1a0d0d 10px,
    #0a0505 10px,
    #0a0505 20px
  );
  display: flex;
  align-items: center;
  justify-content: center;
}
.error-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: #c98c4a;
  text-align: center;
  padding: 1rem 1.4rem;
  border: 1px dashed rgba(201, 140, 74, 0.5);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 6px;
  z-index: 4;
  max-width: 80%;
  word-break: break-all;
  line-height: 1.6;
}
.error-msg strong { color: #e8a86c; display: block; margin-bottom: 0.4rem; font-size: 0.55rem; }

/* NAV ARROWS */
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  color: var(--white);
  cursor: pointer;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.55;
  transition: all 0.4s;
}
.nav-arrow:hover:not(:disabled) {
  opacity: 1;
  border-color: rgba(201, 168, 76, 0.5);
  background: rgba(201, 168, 76, 0.15);
  transform: translateY(-50%) scale(1.06);
}
.nav-arrow:disabled { opacity: 0.15; cursor: not-allowed; }
.nav-prev { left: 2rem; }
.nav-next { right: 2rem; }
.nav-arrow svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }

/* DOTS */
.dots {
  position: fixed;
  bottom: 4.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.5rem;
  z-index: 30;
  max-width: 80vw;
  flex-wrap: nowrap;
  overflow: hidden;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  flex-shrink: 0;
}
.dot:hover { background: rgba(255,255,255,0.45); }
.dot.active {
  background: var(--gold);
  box-shadow: 0 0 10px rgba(201, 168, 76, 0.7);
  width: 24px;
  border-radius: 4px;
}

/* COUNTER */
.counter {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  color: var(--white);
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.counter .current { font-size: 1rem; color: var(--gold); font-weight: 500; }
.counter .total { opacity: 0.6; }
.counter .slash { opacity: 0.3; }

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.6s ease, visibility 0s 0.6s;
}
.lightbox.active {
  opacity: 1;
  visibility: visible;
  transition: opacity 0.6s ease, visibility 0s;
}

.lightbox-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(24px) saturate(0.6);
  -webkit-backdrop-filter: blur(24px) saturate(0.6);
  cursor: zoom-out;
}

.lightbox-content {
  position: relative;
  width: clamp(360px, 42vw, 780px);
  max-height: 90vh;
  background: var(--bg-2);
  border: 1px solid rgba(201, 168, 76, 0.18);
  box-shadow:
    0 60px 120px -30px rgba(0,0,0,0.95),
    0 0 100px -20px rgba(201, 168, 76, 0.2);
  transform: scale(0.92) translateY(20px);
  opacity: 0;
  transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 12px;
}
.lightbox.active .lightbox-content {
  transform: scale(1) translateY(0);
  opacity: 1;
}

.lightbox-image-wrap {
  position: relative;
  width: 100%;
  background: #000;
  overflow: hidden;
  flex: 0 0 auto;
}

.lightbox-image {
  width: 100%;
  height: auto;
  max-height: 60vh;
  object-fit: contain;
  display: block;
}

.lightbox-info {
  padding: 1.8rem 2rem 2rem;
  border-top: 1px solid rgba(201, 168, 76, 0.08);
  flex: 0 0 auto;
}

.lightbox-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--gold);
  font-style: italic;
  font-weight: 300;
  letter-spacing: 0.04em;
  margin-bottom: 0.4rem;
  line-height: 1;
}

.lightbox-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 2vw, 1.7rem);
  color: var(--white);
  font-style: italic;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 0.9rem;
  letter-spacing: -0.01em;
}

.lightbox-meta {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
}

.lightbox-desc {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--cream);
  font-size: 1.02rem;
  line-height: 1.6;
  font-weight: 300;
}

.lightbox-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 50%;
  color: var(--white);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  transition: all 0.3s;
  padding: 0;
}
.lightbox-close:hover {
  border-color: var(--gold);
  background: var(--gold);
  color: var(--bg);
  transform: rotate(90deg);
}
.lightbox-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 42px;
  height: 42px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  color: var(--white);
  cursor: pointer;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  opacity: 0.7;
}
.lightbox-nav:hover { opacity: 1; border-color: var(--gold); background: rgba(201, 168, 76, 0.25); }
.lightbox-prev { left: 0.8rem; }
.lightbox-next { right: 0.8rem; }
.lightbox-nav svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .topbar { padding: 1rem 1.2rem; }
  .nav-arrow { width: 42px; height: 42px; }
  .nav-prev { left: 0.8rem; }
  .nav-next { right: 0.8rem; }
  .photo-item { width: clamp(240px, 78vw, 380px); height: clamp(320px, 58vh, 500px); }
  .lightbox-content { width: 90vw; max-height: 88vh; }
  .lightbox-info { padding: 1.2rem 1.4rem 1.6rem; }
  .dots { bottom: 4rem; }
  .counter { bottom: 1.5rem; }
}
@media (max-width: 480px) {
  .section-mark { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../" class="home-link">Night Owl</a>
  <div class="section-mark">✦ Section 02</div>
</div>

<main class="stage">
  <div class="carousel" id="carousel"></div>

  <button class="nav-arrow nav-prev" id="navPrev" aria-label="Previous photo">
    <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"></polyline></svg>
  </button>
  <button class="nav-arrow nav-next" id="navNext" aria-label="Next photo">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </button>

  <div class="dots" id="dots"></div>

  <div class="counter">
    <span class="current" id="counterCurrent">01</span>
    <span class="slash">/</span>
    <span class="total" id="counterTotal">00</span>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"></polyline></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
    </button>
    <div class="lightbox-image-wrap">
      <img class="lightbox-image" id="lightboxImage" alt="">
    </div>
    <div class="lightbox-info">
      <div class="lightbox-num" id="lightboxNum"></div>
      <h2 class="lightbox-title" id="lightboxTitle"></h2>
      <div class="lightbox-meta" id="lightboxMeta"></div>
      <p class="lightbox-desc" id="lightboxDesc"></p>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   YOUR PHOTOS
   --------------------------------------------------------------------
   Edit this list. Each entry is one photo card.

   src   = path to your image file (must match the filename in
           photography/images/ exactly, including capitalization)
   tag   = small badge shown at top-left of card (optional)
   title = caption headline shown on the card
   meta  = small text under the title (location/year/area)
   desc  = longer caption shown inside the popup modal

   To add a photo: copy any block { ... } and paste it. To remove a
   photo: delete the block. The counter and dots auto-update.
   ===================================================================== */
const photos = [
  {
    src: 'images/alive.png',
    tag: 'Nature',
    title: 'Survive',
    meta: 'Home · Kashmir · 2018',
    desc: 'No Description Yet.'
  },
  {
    src: 'images/citylights.png',
    tag: 'Moody',
    title: 'Cozy',
    meta: 'Gurez · Kashmir',
    desc: 'No Description Yet.'
  },
  {
    src: 'images/escape.png',
    tag: 'Nature',
    title: 'Escape',
    meta: 'Yusmarg · Kashmir',
    desc: 'No Description Yet.'
  },
  {
    src: 'images/rain.png',
    tag: 'Rain',
    title: 'Reflections',
    meta: 'Sonamarg· Kashmir',
    desc: 'No Description Yet.'
  },
  {
    src: 'images/scenic.png',
    tag: 'Kashmir',
    title: 'Riverside',
    meta: 'Pahalgham · Kashmir · 2017',
    desc: 'No Description Yet.'
  },
  {
    src: 'images/shades.png',
    tag: 'Landscape',
    title: 'Where the Light Refused',
    meta: 'Western Ghats · 2023',
    desc: 'The hour the photographers call blue, that everyone else just calls late.'
  },
  {
    src: 'images/trapped.png',
    tag: 'Architecture',
    title: 'Architecture of an Afternoon',
    meta: 'Mumbai · Fort · 2024',
    desc: 'Light arrived at the wall the way an old letter arrives. Slowly, and without explaining itself.'
  },
  {
    src: 'images/vast.png',
    tag: 'Architecture',
    title: 'Architecture of an Afternoon',
    meta: 'Mumbai · Fort · 2024',
    desc: 'Light arrived at the wall the way an old letter arrives. Slowly, and without explaining itself.'
  }
];

/* === ENGINE === */
const carousel = document.getElementById('carousel');
const counterCurrent = document.getElementById('counterCurrent');
const counterTotal = document.getElementById('counterTotal');
const navPrev = document.getElementById('navPrev');
const navNext = document.getElementById('navNext');
const dotsContainer = document.getElementById('dots');

let currentIndex = 0;

photos.forEach((p, i) => {
  const item = document.createElement('div');
  item.className = 'photo-item';
  item.dataset.index = i;
  const tagHTML = p.tag ? `<div class="card-tag">${p.tag}</div>` : '';
  item.innerHTML = `
    <div class="photo-frame">
      ${tagHTML}
      <img alt="${p.title || ''}" data-src="${p.src}">
      <div class="card-overlay">
        <h3 class="card-title">${p.title || ''}</h3>
        <div class="card-meta">${p.meta || ''}</div>
      </div>
    </div>
  `;
  item.addEventListener('click', () => onItemClick(i));
  carousel.appendChild(item);
});

counterTotal.textContent = String(photos.length).padStart(2, '0');

// Pagination dots
if (photos.length <= 20) {
  photos.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Go to photo ${i + 1}`);
    dot.addEventListener('click', () => go(i));
    dotsContainer.appendChild(dot);
  });
} else {
  dotsContainer.style.display = 'none';
}

// Card-stack cover-flow values: cards stay visible, no heavy blur
const COVER_FLOW = [
  null,
  { x: 48, scale: 0.86, opacity: 0.85, blur: 0 },
  { x: 82, scale: 0.72, opacity: 0.45, blur: 0 },
  { x: 112, scale: 0.6,  opacity: 0.18, blur: 0 },
  { x: 140, scale: 0.5,  opacity: 0.06, blur: 0 }
];
const MAX_VISIBLE = COVER_FLOW.length - 1;

function update() {
  const items = carousel.children;
  for (let i = 0; i < items.length; i++) {
    const offset = i - currentIndex;
    const abs = Math.abs(offset);
    const sign = Math.sign(offset);
    const item = items[i];
    let x, scale, opacity, blur, z;

    item.classList.toggle('is-center', offset === 0);

    if (abs > MAX_VISIBLE) {
      x = sign * 220; scale = 0.3; opacity = 0; blur = 12; z = 0;
      item.style.pointerEvents = 'none';
    } else if (offset === 0) {
      x = 0; scale = 1; opacity = 1; blur = 0; z = 100;
      item.style.pointerEvents = 'auto';
    } else {
      const c = COVER_FLOW[abs];
      x = sign * c.x; scale = c.scale; opacity = c.opacity; blur = c.blur;
      z = 100 - abs;
      item.style.pointerEvents = 'auto';
    }

       // UPDATE: Changed 'translate' to 'translate3d' to force GPU acceleration
    item.style.transform = `translate3d(-50%, -50%, 0) translateX(${x}%) scale(${scale})`;
    item.style.opacity = opacity;
    item.style.filter = blur > 0 ? `blur(${blur}px)` : '';
    item.style.zIndex = z;

    // Lazy load
    if (abs <= MAX_VISIBLE + 2) {
      const img = item.querySelector('img');
      if (img && img.dataset.src && !img.src) {
        const path = img.dataset.src;
        img.src = path;
        img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
        img.addEventListener('error', () => {
          const frame = item.querySelector('.photo-frame');
          frame.classList.add('error');
          const msg = document.createElement('div');
          msg.className = 'error-msg';
          msg.innerHTML = `<strong>Image not found</strong>${path}`;
          frame.appendChild(msg);
        }, { once: true });
      }
    }
  }

  counterCurrent.textContent = String(currentIndex + 1).padStart(2, '0');
  navPrev.disabled = currentIndex === 0;
  navNext.disabled = currentIndex === photos.length - 1;

  // Update dots
  const dots = dotsContainer.children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('active', i === currentIndex);
  }
}

function go(i) {
  if (i < 0 || i >= photos.length || i === currentIndex) return;
  currentIndex = i;
  update();
}
function next() { go(currentIndex + 1); }
function prev() { go(currentIndex - 1); }
function onItemClick(i) { i === currentIndex ? openLightbox(i) : go(i); }

navPrev.addEventListener('click', prev);
navNext.addEventListener('click', next);

/* WHEEL */
let wheelAccum = 0;
let wheelLock = false;
let wheelTimer = null;
window.addEventListener('wheel', (e) => {
  if (document.getElementById('lightbox').classList.contains('active')) return;
  e.preventDefault();
  if (wheelLock) return;
  wheelAccum += e.deltaY;
  if (wheelTimer) clearTimeout(wheelTimer);
  if (Math.abs(wheelAccum) > 60) {
    if (wheelAccum > 0) next(); else prev();
    wheelAccum = 0;
    wheelLock = true;
    setTimeout(() => { wheelLock = false; }, 450);
  }
  wheelTimer = setTimeout(() => { wheelAccum = 0; }, 200);
}, { passive: false });

/* KEYBOARD */
window.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('active')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxPrev();
    if (e.key === 'ArrowRight') lightboxNext();
    return;
  }
  if (e.key === 'ArrowLeft') prev();
  else if (e.key === 'ArrowRight') next();
  else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(currentIndex); }
  else if (e.key === 'Home') go(0);
  else if (e.key === 'End') go(photos.length - 1);
});

/* TOUCH */
let touchStartX = null;
let touchStartY = null;
window.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
});

/* LIGHTBOX */
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const lightboxTitle = document.getElementById('lightboxTitle');
const lightboxMeta = document.getElementById('lightboxMeta');
const lightboxDesc = document.getElementById('lightboxDesc');
const lightboxNum = document.getElementById('lightboxNum');
let lightboxIndex = 0;

function openLightbox(i) {
  lightboxIndex = i;
  const p = photos[i];
  lightboxImage.src = p.src;
  lightboxImage.alt = p.title || '';
  lightboxNum.textContent = String(i + 1).padStart(2, '0') + ' / ' + String(photos.length).padStart(2, '0');
  lightboxTitle.textContent = p.title || '';
  lightboxMeta.textContent = p.meta || '';
  lightboxDesc.textContent = p.desc || '';
  lightbox.classList.add('active');
  lightbox.setAttribute('aria-hidden', 'false');
}
function closeLightbox() {
  lightbox.classList.remove('active');
  lightbox.setAttribute('aria-hidden', 'true');
}
function lightboxNext() {
  if (lightboxIndex < photos.length - 1) {
    lightboxIndex++; currentIndex = lightboxIndex; update(); openLightbox(lightboxIndex);
  }
}
function lightboxPrev() {
  if (lightboxIndex > 0) {
    lightboxIndex--; currentIndex = lightboxIndex; update(); openLightbox(lightboxIndex);
  }
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxBackdrop').addEventListener('click', closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click', lightboxPrev);
document.getElementById('lightboxNext').addEventListener('click', lightboxNext);

/* INIT */
requestAnimationFrame(() => { setTimeout(update, 80); });
window.addEventListener('resize', update);
</script>

</body>
